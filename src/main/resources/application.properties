spring.application.name=demo

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/floworder}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:somu}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:somu}

spring.datasource.driver-class-name=org.postgresql.Driver

#JPA/HIBERNATE

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

#REDIS
spring.data.redis.host=${SPRING_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_REDIS_PORT:6379}

#server
server.port=${SERVER.PORT:8080}